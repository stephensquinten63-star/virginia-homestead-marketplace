<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🏡 Virginia Homestead Marketplace</h1>
  <p>Seller Registration</p>
</header>

<section class="categories">
  <h2>Open Your Shop</h2>

  <form>
    <p>
      <input type="text" placeholder="Full Name">
    </p>

    <p>
      <input type="email" placeholder="Email Address">
    </p>

    <p>
      <input type="password" placeholder="Password">
    </p>

    <p>
      <input type="text" placeholder="Shop Name">
    </p>

    <p>
      <textarea placeholder="Shop Description"></textarea>
    </p>

    <h3>Payment Information</h3>

    <p>
      <input type="text" placeholder="Cash App Tag">
    </p>

    <p>
      <input type="text" placeholder="Venmo Username">
    </p>

    <p>
      <input type="email" placeholder="PayPal Email">
    </p>

    <h3>Select Plan</h3>

    <select>
      <option>Free</option>
      <option>Basic ($9)</option>
      <option>Advanced ($19)</option>
      <option>Multi-Advanced ($39)</option>
    </select>

    <br><br>

    <button type="submit">Create Shop</button>

  </form>
</section>

</body>
</html>
